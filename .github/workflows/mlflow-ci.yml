name: Workflow CI - MLflow Project

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12.7"
  DOCKERHUB_USERNAME: "muhyusufarhman"
  MODEL_REPOSITORY_NAME: "breast-cancer-mlflow-model"
  MLFLOW_TRACKING_URI: "file:${{ github.workspace }}/MLProject/mlruns"

jobs:
  train-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Check Env
        run: |
          python --version
          pip --version
          docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mlflow project
        run: |
          mlflow run MLProject \
            --env-manager=local \
            --experiment-name "Workflow CI - Breast Cancer Classification"

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(cat MLProject/latest_run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "MODEL_URI=runs:/$RUN_ID/model" >> $GITHUB_ENV
          echo "Latest run id: $RUN_ID"

      - name: Upload MLflow artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts-${{ github.run_number }}
          path: |
            MLProject/mlruns
            MLProject/artifacts
            MLProject/latest_run_id.txt
          retention-days: 30

      - name: Build Docker Model
        run: |
          IMAGE_NAME="${{ env.DOCKERHUB_USERNAME }}/${{ env.MODEL_REPOSITORY_NAME }}:${{ github.sha }}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "$IMAGE_NAME" \
            --env-manager=local

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        if: github.event_name != 'pull_request'
        run: |
          docker tag "$IMAGE_NAME" "${{ env.DOCKERHUB_USERNAME }}/${{ env.MODEL_REPOSITORY_NAME }}:latest"

      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        run: |
          docker push "$IMAGE_NAME"
          docker push "${{ env.DOCKERHUB_USERNAME }}/${{ env.MODEL_REPOSITORY_NAME }}:latest"
